<!doctype html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wat kost deze meeting?</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root { --lime:#a3e635; --lime2:#84cc16; --bg:#000; --line:#2a3f17; }
* { box-sizing:border-box; }

body {
  margin:0;
  background:var(--bg);
  color:var(--lime);
  font-family:"Share Tech Mono", monospace;
  text-shadow:0 0 10px var(--lime), 0 0 20px var(--lime2);
  padding:24px;
}

h1 { font-size:clamp(28px,4vw,56px); margin:0 0 8px; font-weight:900; }
.big { font-size:clamp(40px,8vw,96px); font-weight:900; line-height:1; }
.nums { font-variant-numeric:tabular-nums; }
.muted { opacity:.75; }
.grid { margin-top:16px; border-top:1px solid var(--line); padding-top:12px; }
.row { display:flex; align-items:center; gap:8px; margin-top:8px; }
.card { background:#0b1307; border:1px solid rgba(132,204,22,.2); border-radius:14px; padding:12px; }
.right { margin-left:auto; }

input[type="text"], input[type="number"] {
  background:rgba(30,58,17,.3);
  border:1px solid rgba(132,204,22,.35);
  color:var(--lime);
  border-radius:8px;
  padding:8px 10px;
  outline:none;
}

input[type="number"] { width:90px; }

button {
  cursor:pointer;
  border:0;
  border-radius:10px;
  padding:10px 14px;
  color:#d9f99d;
  background:#1a2b10;
}

button:hover { filter:brightness(1.1); }
.primary { background:#365314; }
.warn { background:#78350f; }
.ghost { background:#111; color:#cbd5e1; }

.controls { display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
.hint { margin-top:16px; font-size:12px; opacity:.6; }
.topline { display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
</style>
</head>

<body>

<h1>Wat kost deze meeting?</h1>

<div id="total" class="big nums">EUR 0,00</div>
<div id="meta" class="muted" style="margin-top:6px;">Tijd: 00:00:00 | EUR 0,00 per seconde</div>

<div class="grid">
  <div class="topline">
    <strong>Deelnemers</strong>
    <button id="addBtn" class="primary">Voeg deelnemer toe</button>
    <div class="right muted">Tarief is euro per uur - Kosten lopen realtime op</div>
  </div>
  <div id="list"></div>
</div>

<div class="controls">
  <button id="startBtn" class="primary">Start</button>
  <button id="pauseBtn" class="warn">Pauzeer</button>
  <button id="resetBtn" class="ghost">Reset</button>
</div>

<p class="hint">Tip: druk op F voor fullscreen - Gegevens worden lokaal opgeslagen</p>

<script>
// ---------- State ----------
let people = [];

try {
  const saved = JSON.parse(localStorage.getItem("meeting_people") || "[]");
  people = Array.isArray(saved) && saved.length ? saved : [
    { name:"Strategist", rate:95 },
    { name:"Creative", rate:85 },
    { name:"Account", rate:80 }
  ];
} catch {
  people = [{ name:"Strategist", rate:95 }];
}

let running = false;
let startTs = null;
let accumulated = 0;

// ---------- Helpers ----------
function euro(n){
  return n.toLocaleString("nl-NL", {
    style:"currency",
    currency:"EUR",
    maximumFractionDigits:2
  });
}

function formatTime(s){
  s = Math.max(0, Math.floor(s));
  const h = String(Math.floor(s/3600)).padStart(2,"0");
  const m = String(Math.floor((s%3600)/60)).padStart(2,"0");
  const sec = String(s%60).padStart(2,"0");
  return h + ":" + m + ":" + sec;
}

function elapsedSeconds(){
  if(running && startTs != null){
    return accumulated + (performance.now() - startTs) / 1000;
  }
  return accumulated;
}

function save(){
  localStorage.setItem("meeting_people", JSON.stringify(people));
}

// ---------- DOM ----------
const totalEl = document.getElementById("total");
const metaEl  = document.getElementById("meta");
const listEl  = document.getElementById("list");

const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const resetBtn = document.getElementById("resetBtn");
const addBtn   = document.getElementById("addBtn");

// ---------- Actions ----------
function start(){
  if(running) return;
  startTs = performance.now();
  running = true;
}

function pause(){
  if(!running || startTs == null) return;
  accumulated += (performance.now() - startTs) / 1000;
  running = false;
  startTs = null;
}

function reset(){
  running = false;
  startTs = null;
  accumulated = 0;
}

function addPerson(){
  people.push({ name:"Nieuw", rate:80 });
  save();
  render();
}

function removePerson(i){
  people.splice(i,1);
  save();
  render();
}

function updateName(i,val){
  people[i].name = val;
  save();
}

function updateRate(i,val){
  const v = Number(val);
  people[i].rate = Number.isFinite(v) ? v : 0;
  save();
}

// ---------- Render ----------
function render(){
  const elapsed = elapsedSeconds();
  const totalRate = people.reduce((s,p)=> s + (Number(p.rate)||0),0);
  const perSec = totalRate / 3600;
  const cost = perSec * elapsed;

  totalEl.textContent = euro(cost);
  metaEl.textContent = "Tijd: " + formatTime(elapsed) + " | " + euro(perSec) + " per seconde";

  listEl.innerHTML = "";

  people.forEach((p,i)=>{
    const row = document.createElement("div");
    row.className = "row card";

    row.innerHTML =
      '<input type="text" value="'+p.name+'">' +
      '<input type="number" value="'+(Number(p.rate)||0)+'">' +
      '<div class="right nums">'+ euro(((Number(p.rate)||0)/3600)*elapsed) +'</div>' +
      '<button>X</button>';

    const nameInput = row.children[0];
    const rateInput = row.children[1];
    const rmBtn     = row.children[3];

    nameInput.addEventListener("input", e=>updateName(i,e.target.value));
    rateInput.addEventListener("input", e=>updateRate(i,e.target.value));
    rmBtn.addEventListener("click", ()=>removePerson(i));

    listEl.appendChild(row);
  });
}

// ---------- Loop ----------
function tick(){
  render();
  requestAnimationFrame(tick);
}

// ---------- Events ----------
startBtn.addEventListener("click", start);
pauseBtn.addEventListener("click", pause);
resetBtn.addEventListener("click", reset);
addBtn.addEventListener("click", addPerson);

document.addEventListener("keydown", function(e){
  if(e.key.toLowerCase() === "f"){
    if(!document.fullscreenElement){
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
});

// ---------- Init ----------
render();
tick();

</script>
</body>
</html>
